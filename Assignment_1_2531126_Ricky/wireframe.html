<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #181310;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #181310;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
            background: linear-gradient(135deg, rgba(24, 19, 16, 1) 0%, rgba(168, 153, 146, 1) 100%);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 2rem;
            color: white;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .nav-right-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
        }

        /* The "Inquiries" Block - Right Aligned */
        .nav-inquiries-block {
            display: flex;
            align-items: center;
            height: 100%;
            margin-right: -2rem;
            cursor: pointer;
            /* Negates the nav padding to touch the edge */
        }

        .nav-inquiries-block:hover {
            color: #AFDB0F;
            transition: color 0.3s ease;
        }

        .nav-divider {
            width: 1.5px;
            height: 40px;
            /* Matches the "About Me" accent height */
            background-color: rgba(255, 255, 255, 0.5);
        }

        .nav-inquiries-text {
            display: flex;
            flex-direction: column;
            padding: 0 1.5rem;
            line-height: 1.2;
        }

        .nav-inquiries-text span {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-logo {
            grid-column: 2;
            background: none;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 2rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .close-sidebar {
            border: 2px solid rgba(255, 255, 255, 0.8);
            padding: 8px 30px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.1);
            transition: border 0.3s ease;
        }

        .close-sidebar:hover {
            border: 2px solid #AFDB0F;
            color: #AFDB0F;
            transition: all 0.3s ease;
        }

        .hamburger-lines {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 30px;
        }

        .hamburger-lines:hover .line {
            background: #AFDB0F;
            transition: background 0.3s ease;
        }

        .line {
            width: 100%;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        #sidebar,
        #sidebar-right {
            position: fixed;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, rgba(24, 19, 16, 1) 0%, rgba(168, 153, 146, 1) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.77, 0.2, 0.05, 1.0);
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        #sidebar {
            left: 0;
            transform: translateX(-100%);
        }

        #sidebar.open {
            transform: translateX(0);
        }

        /* Sidebar Right Base */
        #sidebar-right {
            position: fixed;
            top: 0;
            right: 0;
            /* Align to right side */
            width: 280px;
            height: 100%;
            z-index: 2000;
            transform: translateX(100%);
            /* Start hidden off-screen to the right */
            transition: transform 0.4s cubic-bezier(0.77, 0.2, 0.05, 1.0);
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        #sidebar-right.open {
            transform: translateX(0);
            /* Slide in */
        }

        /* --- CONTACTS LIST STYLING --- */
        .contact-links {
            list-style: none;
            margin-top: 20px;
        }

        .contact-links li {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .contact-links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: block;
        }

        .contact-links a:hover {
            color: #AFDB0F;
            transform: translateX(-5px);
            /* Slide slightly left on hover */
        }

        .section-divider {
            width: 100%;
            height: 3px;
            background: white;
        }

        .sidebar-header {
            display: flex;
            justify-content: center;
            margin-bottom: 4rem;
        }

        .sidebar-section {
            margin-bottom: 0.75rem;
        }

        #sidebar .sidebar-section a {
            text-decoration: none;
            display: inline-block;
            width: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
        }

        #sidebar .sidebar-section a:hover {
            transform: translateX(10px);
        }

        .sidebar-section.active a {
            color: rgb(202, 184, 176);
            pointer-events: none;
            cursor: default;
        }

        .sidebar-section.active .section-divider {
            background: rgb(225, 210, 200);
            height: 6px;
            box-shadow: 0 0 0px rgba(190, 181, 174, 0.2);
        }

        .sidebar-section h3 {
            color: white;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .sidebar-section.active h3 {
            color: rgb(225, 210, 200);
            text-shadow: 0 0 12px rgba(190, 181, 174, 0);
            pointer-events: none;
            cursor: default;
        }

        .sidebar-section:not(.active):hover h3 {
            color: #AFDB0F;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .sidebar-section:not(.active):hover .section-divider {
            background: #AFDB0F;
            height: 4px;
            transition: all 0.3s ease;
        }

        /* BAREBONE PAGE*/

        .content-wrapper {
            width: 100%;
            /* 100vh minus the 80px navbar height */
            height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            /* Light contrast for the viewer */
        }

        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Responsive adjustment for mobile */
        @media (max-width: 768px) {
            .content-wrapper {
                height: calc(100vh - 80px);
            }
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="close-sidebar" onclick="toggleSidebar()">Close</span>
        </div>

        <div class="sidebar-section">
            <a href="Biodata.html">
                <h3>HOME</h3>
                <div class="section-divider"></div>
            </a>
        </div>

        <div class="sidebar-section">
            <a href="profile.html">
                <h3>PROFILE</h3>
                <div class="section-divider"></div>
            </a>
        </div>

        <div class="sidebar-section active">
            <a href="projects.html">
                <h3>PROJECTS</h3>
                <div class="section-divider"></div>
            </a>
        </div>



        <div class="sidebar-section">
            <a href="wireframe.html" onclick="toggleSidebar()">
                <h3>Wireframe Details</h3>
                <div class="section-divider"></div>
            </a>
        </div>
    </div>

    <div id="sidebar-right" class="sidebar-right">
        <div class="sidebar-header">
            <span class="close-sidebar" onclick="toggleSidebar('right')">Close</span>
        </div>

        <div class="sidebar-content">
            <h3 style="color: white;">Contacts</h3>
            <div class="section-divider"></div>
            <ul class="contact-links">
                <li><a href="mailto:your@email.com">Email</a></li>
                <li><a href="#">LinkedIn</a></li>
                <li><a href="#">GitHub</a></li>
            </ul>
        </div>
    </div>

    <nav>
        <div class="nav-left">
            <div class="hamburger-lines" onclick="toggleSidebar('left')">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>

        <button class="nav-logo" onclick="location.href='Biodata.html#runScroll'">PORTFOLIO</button>

        <div class="nav-right-container">
            <div class="nav-inquiries-block" onclick="toggleSidebar('right')">
                <div class="nav-divider"></div>
                <div class="nav-inquiries-text">
                    <span>Further</span>
                    <span>Inquiries</span>
                </div>
            </div>
        </div>
    </nav>
    <!--BAREBONE PAGE-->
    <main class="content-wrapper">
        <iframe src="3_page_Wireframe.pdf" class="pdf-viewer" title="Project Wireframe">
            <!--src="3_page_Wireframe.pdf#toolbar=0&navpanes=0"-->
        </iframe>
    </main>

    <script>
        function toggleSidebar(side) {
            if (side === 'right') {
                document.getElementById('sidebar-right').classList.toggle('open');
            } else {
                document.getElementById('sidebar').classList.toggle('open');
            }
        }
        // BAREBONE PAGE
    </script>
</body>

</html>
