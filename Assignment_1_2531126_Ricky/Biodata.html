<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Saya</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Reset Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f4f4f9;
        }

        /* Navbar & Header */
        .navbar {
            display: flex;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 1rem;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin-left: auto;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        /* Sidebar */
        .sidebar {
            height: 100%;
            width: 0;
            /* Mulai dengan tertutup */
            position: fixed;
            z-index: 999;
            top: 60px;
            /* Di bawah navbar */
            left: 0;
            background-color: #ffffff;
            overflow-x: hidden;
            transition: 0.3s;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar-content {
            padding: 20px;
            width: 250px;
        }

        /* Tombol Toggle */
        .toggle-btn {
            font-size: 1.5rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Main Content */
        main {
            margin-top: 80px;
            padding: 20px;
            transition: margin-left 0.3s;
        }

        .hero {
            text-align: center;
            padding: 50px 0;
        }

        /* Styling Profile di Sidebar */
        .profile-section {
            text-align: center;
            padding-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            /* Membuat gambar jadi bulat */
            object-fit: cover;
            border: 3px solid #2c3e50;
            margin-bottom: 15px;
            background-color: #ddd;
        }

        .profile-section h3 {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .profile-section span {
            font-size: 0.9rem;
            color: #7f8c8d;
            display: block;
        }

        .separator {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .bio-details p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #34495e;
            margin-bottom: 10px;
        }

        /* Container untuk Grid Proyek */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        /* Styling Kartu Proyek */
        .project-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            text-align: left;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .project-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        .tag {
            display: inline-block;
            background: #e1e8ed;
            color: #2c3e50;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        /* Tambahkan ini di style.css */
        #content-area {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Styling Form Kontak */
        .contact-section {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Styling Tombol CTA */
        .cta-btn {
            background-color: #2c3e50;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .cta-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <ul class="nav-links">
                    <li><a href="#" onclick="showHome(event)">Home</a></li>
                    <li><a href="#" onclick="showProjects(event)">Projects</a></li>
                    <li><a href="#" onclick="showContact(event)">Contact</a></li>
                </ul>
            </ul>
        </nav>
    </header>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="profile-section">
                <img src=".\1770347325712.jpg" alt="Profile Picture" class="profile-img">
                <h3>Ricky</h3>
                <span>Aspiring Developer</span>
            </div>

            <hr class="separator">

            <div class="bio-details">
                <p><strong>Fokus:</strong> Software Engineering</p>
                <p><strong>Lokasi:</strong> Indonesia</p>
                <p><strong>Tech Stack:</strong><br> TypeScript, Node.js, CSS</p>
            </div>
        </div>
    </aside>

    <main id="main-content">
        <div id="content-area">
            <section class="hero">
                <h1>Selamat Datang di Portfolio Saya</h1>
                <p>Seorang pengembang yang berfokus pada solusi teknologi modern.</p>
            </section>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            const isOpen = sidebar.style.width === "250px";

            if (isOpen) {
                sidebar.style.width = "0";
                mainContent.style.marginLeft = "0";
            } else {
                sidebar.style.width = "250px";
                mainContent.style.marginLeft = "250px";
            }
        }

        function renderHome() {
            const contentArea = document.getElementById("content-area");
            contentArea.innerHTML = `
        <section class="hero">
            <h1>Selamat Datang di Portfolio Saya</h1>
            <p>Seorang pengembang yang berfokus pada pembangunan aplikasi yang stabil dan aman.</p>
        </section>
    `;
        }

        // Fungsi untuk tombol Home di Navbar
        function showHome(event) {
            event.preventDefault();
            renderHome();
        }

        // Pastikan saat halaman pertama kali dibuka, konten Home langsung muncul
        window.onload = renderHome;

        const dummyProjects = [
            {
                title: "E-Delivery System",
                desc: "Sistem manajemen pengiriman paket dengan integrasi database relasional.",
                tech: ["SQL", "Node.js"]
            },
            {
                title: "Auth Guard Pro",
                desc: "Sistem autentikasi user yang aman dengan enkripsi data dan perlindungan sesi.",
                tech: ["TypeScript", "JWT"]
            },
            {
                title: "Inventory Manager",
                desc: "Aplikasi manajemen stok barang real-time untuk efisiensi operasional gudang.",
                tech: ["React", "Express"]
            },
            {
                title: "Personal Finance Tracker",
                desc: "Aplikasi pencatatan keuangan harian dengan fitur kategori otomatis.",
                tech: ["JavaScript", "Local Storage"]
            }
        ];

        function showProjects(event) {
            event.preventDefault(); // Mencegah halaman reload saat link diklik
            const contentArea = document.getElementById("content-area");

            let html = `<h2>My Projects</h2><div class="projects-grid">`;

            dummyProjects.forEach(proj => {
                html += `
            <div class="project-card">
                <h3>${proj.title}</h3>
                <p>${proj.desc}</p>
                <div>
                    ${proj.tech.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            </div>
        `;
            });

            html += `</div>`;
            contentArea.innerHTML = html;
        }

        // Fungsi untuk menampilkan halaman Contact
        function showContact(event) {
            event.preventDefault();
            const contentArea = document.getElementById("content-area");

            contentArea.innerHTML = `
        <section class="contact-section">
            <h2>Hubungi Saya</h2>
            <p>Silakan kirim pesan melalui formulir di bawah ini:</p>
            <form class="contact-form">
                <input type="text" placeholder="Nama Lengkap" required>
                <input type="email" placeholder="Email Anda" required>
                <textarea placeholder="Pesan Anda" rows="5" required></textarea>
                <button type="submit" class="cta-btn">Kirim Pesan</button>
            </form>
        </section>
    `;
        }
    </script>
</body>

</html>
